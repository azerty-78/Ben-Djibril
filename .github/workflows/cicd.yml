name: CI/CD

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master
      - develop

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  IMAGE_NAME: ben-djibril-site
  TRUFFLEHOG_VERSION: "3.95.3"
  DOCKERFILE_PATH: setup-front/Dockerfile
  COMPOSE_FILE: setup-front/compose.yaml

jobs:
  tag:
    name: Compute version tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      docker_tag: ${{ steps.compute.outputs.docker_tag }}
      short_sha: ${{ steps.compute.outputs.short_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version and docker tag
        id: compute
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          elif [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            VERSION="pr-${{ github.event.pull_request.number }}-${SHORT_SHA}"
          else
            BRANCH="${GITHUB_REF_NAME//\//-}"
            VERSION="${BRANCH}-${SHORT_SHA}"
          fi

          DOCKER_TAG="$(echo "${VERSION}" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9._-' '-' | sed 's/^[.-]*//' | cut -c1-128)"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "docker_tag=${DOCKER_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  lint-typecheck:
    name: Lint and typecheck
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint || echo "::warning::ESLint errors detected (non-blocking)"

      - name: Run TypeScript check
        run: npx tsc -b --pretty false || echo "::warning::TypeScript issues detected (non-blocking)"

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests (skipped if no test script defined)
        run: npm test --if-present

  secret-scan:
    name: Secret scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog (PR diff scan)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified

      - name: Install TruffleHog (push / tag)
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          ver="${TRUFFLEHOG_VERSION}"
          asset="trufflehog_${ver}_linux_amd64.tar.gz"
          url="https://github.com/trufflesecurity/trufflehog/releases/download/v${ver}/${asset}"
          tmp="$(mktemp -d)"
          curl -sSfL "$url" -o "${tmp}/${asset}"
          tar -xzf "${tmp}/${asset}" -C "${tmp}"
          sudo install -m 0755 "${tmp}/trufflehog" /usr/local/bin/trufflehog
          rm -rf "${tmp}"
          trufflehog --version

      - name: TruffleHog (filesystem scan on push / tag)
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          trufflehog filesystem . \
            --only-verified \
            --fail \
            --no-update

  dependency-audit:
    name: npm audit
    runs-on: ubuntu-latest
    needs: tag
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (fail on critical)
        run: npm audit --audit-level=critical --omit=dev

  build:
    name: Build Vite application
    runs-on: ubuntu-latest
    needs:
      - tag
      - lint-typecheck
      - unit-tests
      - secret-scan
      - dependency-audit
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npx vite build

  docker-build:
    name: Build, scan and SBOM Docker image
    runs-on: ubuntu-latest
    needs: [tag, build]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}
            ${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.short_sha }}
          build-args: |
            VITE_EMAILJS_PUBLIC_KEY=${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
            VITE_EMAILJS_SERVICE_ID=${{ secrets.VITE_EMAILJS_SERVICE_ID }}
            VITE_EMAILJS_CONTACT_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_CONTACT_TEMPLATE_ID }}
            VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (report only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:${{ needs.tag.outputs.docker_tag }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ needs.tag.outputs.short_sha }}
          path: sbom.spdx.json
          retention-days: 30
          if-no-files-found: error

  docker-push:
    name: Push image to Docker Hub
    runs-on: ubuntu-latest
    needs: [tag, docker-build]
    if: |
      github.event_name != 'pull_request' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.push.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.tag.outputs.docker_tag }}
            type=raw,value=${{ needs.tag.outputs.short_sha }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_EMAILJS_PUBLIC_KEY=${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
            VITE_EMAILJS_SERVICE_ID=${{ secrets.VITE_EMAILJS_SERVICE_ID }}
            VITE_EMAILJS_CONTACT_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_CONTACT_TEMPLATE_ID }}
            VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID=${{ secrets.VITE_EMAILJS_NEWSLETTER_TEMPLATE_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  docker-sign:
    name: Sign image with cosign (keyless OIDC)
    runs-on: ubuntu-latest
    needs: [tag, docker-push]
    if: |
      github.event_name != 'pull_request' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Hub image
        env:
          COSIGN_EXPERIMENTAL: "true"
          IMAGE_REF: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}@${{ needs.docker-push.outputs.digest }}
        run: cosign sign --yes "${IMAGE_REF}"

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [tag, docker-push, docker-sign]
    if: |
      github.event_name != 'pull_request' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=()
          [ -z "${VPS_HOST}" ] && missing+=("VPS_HOST")
          [ -z "${VPS_USERNAME}" ] && missing+=("VPS_USERNAME")
          [ -z "${VPS_SSH_KEY}" ] && missing+=("VPS_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Secrets VPS manquants : ${missing[*]}"
            exit 1
          fi

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "setup-front/compose.yaml"
          target: "${{ secrets.VPS_DEPLOY_DIR || '~/kobe-corporation/ben-djibril/setup-front' }}/"
          strip_components: 2
          overwrite: true

      - name: Deploy via SSH (pull & restart)
        uses: appleboy/ssh-action@v1.2.0
        env:
          FRONT_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          DEPLOY_DIR: ${{ secrets.VPS_DEPLOY_DIR || '~/kobe-corporation/ben-djibril/setup-front' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: FRONT_IMAGE,DOCKERHUB_USERNAME,DOCKERHUB_PASSWORD,DEPLOY_DIR
          script: |
            set -eu

            DEPLOY_DIR="${DEPLOY_DIR:-$HOME/kobe-corporation/ben-djibril/setup-front}"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker absent sur le VPS"
              exit 1
            fi

            if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_PASSWORD:-}" ]; then
              echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            fi

            docker network inspect kobecorp-network >/dev/null 2>&1 || docker network create kobecorp-network

            echo "==> Pull image Docker Hub : $FRONT_IMAGE"
            docker pull "$FRONT_IMAGE"

            echo "==> Docker Compose pull/up"
            docker compose -f compose.yaml pull
            docker compose -f compose.yaml up -d --force-recreate --remove-orphans
            docker compose -f compose.yaml ps
            docker image prune -f

            docker logout || true

  smoke-test:
    name: Smoke test post-deploy
    runs-on: ubuntu-latest
    needs: [deploy]
    if: |
      github.event_name != 'pull_request' &&
      (
        startsWith(github.ref, 'refs/tags/') ||
        github.ref == 'refs/heads/master' ||
        github.ref == 'refs/heads/main'
      )
    permissions:
      contents: read
    steps:
      - name: Healthcheck SSH (container + local probe)
        uses: appleboy/ssh-action@v1.2.0
        env:
          CONTAINER_NAME: ben-djibril-site
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT || 22 }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: CONTAINER_NAME
          script: |
            set -eu
            RUNNING="$(docker ps --filter "name=^${CONTAINER_NAME}$" --format '{{.Names}}')"
            if [ "$RUNNING" != "$CONTAINER_NAME" ]; then
              echo "Conteneur ${CONTAINER_NAME} absent ou arrêté"
              docker ps -a
              exit 1
            fi

            HEALTH="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "${CONTAINER_NAME}")"
            echo "Health status: ${HEALTH}"

            docker exec "${CONTAINER_NAME}" wget -q --spider http://localhost/ || {
              echo "Le conteneur ne répond pas en local"
              docker logs --tail 100 "${CONTAINER_NAME}" || true
              exit 1
            }
